spring.application.name=AuthApi

# ── Banco de dados ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@oracle.fiap.com.br:1521:orcl
spring.datasource.username=RM99856
spring.datasource.password=280105
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.session.store-type=none

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# ── Teste 5: logs SQL e Spring Security desligados em produção ────────────────
# ⚠️ Em DEV você pode ligar novamente; em PROD mantenha como abaixo
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=OFF

# ── Auditoria: logs [AUDIT] visíveis em INFO ─────────────────────────────────
logging.level.com.challenge.AuthApi=INFO

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=MinhaChaveSuperSecretaComMaisDe32CaracteresSeguros123!
jwt.expiration=3600000

# ── Teste 1.4: limite de payload no Tomcat ────────────────────────────────────
server.tomcat.max-http-form-post-size=10KB
server.tomcat.max-swallow-size=10KB

spring.servlet.multipart.max-request-size=10KB
spring.servlet.multipart.max-file-size=10KB

# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080
